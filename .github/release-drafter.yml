name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Nuevas funcionalidades"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Seguridad"
    labels:
      - "security"
  - title: "Performance"
    labels:
      - "performance"
  - title: "Infraestructura / CI"
    labels:
      - "ci"
      - "infrastructure"
      - "dependencies"
  - title: "Base de datos"
    labels:
      - "database"
  - title: "Documentación"
    labels:
      - "docs"

# v7.219.0 (M2): autolabeler por prefijo Conventional Commits del título del PR.
# El workflow pr-title.yml valida que el título respete estos prefijos.
autolabeler:
  - label: "feature"
    title:
      - "/^feat(\\(.+\\))?!?:/i"
  - label: "fix"
    title:
      - "/^fix(\\(.+\\))?!?:/i"
  - label: "performance"
    title:
      - "/^perf(\\(.+\\))?!?:/i"
  - label: "refactor"
    title:
      - "/^refactor(\\(.+\\))?!?:/i"
  - label: "docs"
    title:
      - "/^docs(\\(.+\\))?!?:/i"
  - label: "ci"
    title:
      - "/^ci(\\(.+\\))?!?:/i"
      - "/^build(\\(.+\\))?!?:/i"
  - label: "chore"
    title:
      - "/^chore(\\(.+\\))?!?:/i"
  - label: "breaking"
    title:
      - "/!:/"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
      - "chore"
      - "dependencies"
      - "docs"
      - "ci"
  default: patch

exclude-labels:
  - "skip-changelog"

template: |
  ## Cambios en esta versión

  $CHANGES

  **Changelog interno:** ver `public/changelog/v$RESOLVED_VERSION.json`.
