name: Setup Bun project
description: Checkout, instalar Bun, restaurar cache e instalar deps con frozen lockfile.

inputs:
  bun-version:
    description: Versión exacta de Bun (pineada para reproducibilidad; dependabot actualiza vía github-actions).
    required: false
    default: "1.2.23"

runs:
  using: composite
  steps:
    - name: Setup Bun
      # Pin a commit SHA por seguridad (action de terceros). Equivale a v2.2.0.
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ inputs.bun-version }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
