name: Setup Bun project
description: Checkout, instalar Bun, restaurar cache e instalar deps con frozen lockfile.

inputs:
  bun-version:
    description: Versión de Bun
    required: false
    default: "1.2.x"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ inputs.bun-version }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
