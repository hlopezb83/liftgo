name: Lighthouse

on:
  schedule:
    # Diario 11:00 UTC (05:00 America/Monterrey)
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL a auditar (default: preview de Lovable)"
        required: false
        default: "https://liftgo.lovable.app"

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Lighthouse
        run: npm i -g lighthouse@12

      - name: Run Lighthouse
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://liftgo.lovable.app' }}
        run: |
          mkdir -p reports/lighthouse
          lighthouse "$TARGET_URL" \
            --output=html --output=json \
            --output-path=reports/lighthouse/report \
            --chrome-flags="--headless=new --no-sandbox" \
            --quiet || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: reports/lighthouse/
          retention-days: 30
          if-no-files-found: warn
