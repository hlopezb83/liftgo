name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/changelog/**"
      - "public/changelog.json"
      - "**/*.md"
      - ".lovable/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "public/changelog/**"
      - "public/changelog.json"
      - "**/*.md"
      - ".lovable/**"
  schedule:
    # Lunes 12:00 UTC (06:00 America/Monterrey)
    - cron: "0 12 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  # `paths-ignore` en push/PR sí filtra; en `schedule` NO aplica y siempre corre CodeQL completo.
  # En `push: main` preservamos runs (no cancelamos) para mantener histórico de seguridad por SHA.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
