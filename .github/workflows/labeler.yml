name: PR labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Aplicar labels por path
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Etiquetar por archivos cambiados
        # Pin a SHA por seguridad (pull_request_target expone el token del repo base).
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
