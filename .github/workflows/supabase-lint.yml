name: Supabase migrations lint

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guards:
    name: GRANT + RLS guards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Necesario para el diff contra base_ref.
          fetch-depth: 0
      - uses: ./.github/actions/setup-bun-project

      - name: Resolver migraciones nuevas/modificadas
        id: files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            FILES=$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}"...HEAD -- 'supabase/migrations/*.sql' | tr '\n' ' ')
          else
            FILES=$(ls supabase/migrations/*.sql 2>/dev/null | tr '\n' ' ' || true)
          fi
          echo "list=${FILES}" >> "$GITHUB_OUTPUT"
          echo "Archivos: ${FILES:-<ninguno>}"

      - name: Validar GRANT / RLS / POLICY / search_path
        if: steps.files.outputs.list != ''
        run: bun scripts/lint-migrations.ts ${{ steps.files.outputs.list }}

  cli-lint:
    name: supabase db lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: latest

      - name: supabase db lint
        # No requiere proyecto remoto: lint sintáctico de las migraciones locales.
        run: supabase db lint --linked=false || true
