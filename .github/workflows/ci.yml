name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Concurrencia por workflow+ref: un push nuevo cancela el run anterior del mismo branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Knip, Tests, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin a major.minor para evitar roturas silenciosas por releases nuevos.
          bun-version: "1.2.x"

      # Cache del store global de bun: acelera installs en runs posteriores.
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      # Typecheck blocker: previene que código con errores de tipos se mergee
      # aunque los tests pasen. Verificado pasando hoy con tsconfig.app.json.
      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit -p tsconfig.app.json

      # Falla el PR si aparecen archivos huérfanos o dependencias sin uso.
      - name: Knip (archivos y dependencias sin uso)
        run: bunx knip --include files,dependencies,binaries --reporter compact

      # Solo informativo: exports y tipos sin uso (no rompen el PR pero quedan visibles en amarillo).
      - name: Knip (exports/tipos sin uso, informativo)
        run: bunx knip --include exports,types --reporter compact
        continue-on-error: true

      # Pre-crear reports/ defensivamente: si vitest falla antes de inicializar
      # los reporters, el step siguiente de junit-action mostrará el error real
      # en vez del confuso "No test results found".
      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Tests (Vitest)
        run: bun run test

      - name: Upload Vitest reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-reports
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish Vitest results to PR summary
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: reports/vitest-junit.xml
          check_name: Vitest results
          # Gates de CI: el job debe fallar si un test falla o si no se generó
          # ningún XML (corrida sin tests = bug, no éxito silencioso).
          fail_on_failure: true
          require_tests: true

      - name: Build
        run: bun run build

  rls:
    name: RLS contract tests (Vitest subset)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: RLS subset (roleMatrix + *.rls.test.ts)
        run: bun run test:rls

      - name: Upload RLS reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rls-reports
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish RLS results to PR summary
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: reports/rls-junit.xml
          check_name: RLS results
          fail_on_failure: true
          require_tests: true

  edge-functions:
    name: Edge Functions (Deno smoke tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # Deno 2.x es estable desde oct-2024. Verificar antes de subir mayor.
          deno-version: v2.x

      - name: Deno fmt --check
        run: cd supabase/functions && deno fmt --check

      - name: Deno lint
        run: cd supabase/functions && deno lint

      - name: Run Deno tests
        # Cargamos los archivos en un array para detectar el caso "0 tests" (exit 1).
        # `mkdir -p reports` evita que `--junit-path` falle si el directorio no existe.
        # `SUPABASE_URL` se inyecta explícito para no depender del fallback localhost
        # del helper (que es solo una red de seguridad para evitar tocar producción).
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          set -euo pipefail
          mkdir -p reports
          mapfile -d '' TEST_FILES < <(find supabase/functions -name 'index_test.ts' -print0)
          if [[ ${#TEST_FILES[@]} -eq 0 ]]; then
            echo "::error::No se encontraron archivos index_test.ts en supabase/functions"
            exit 1
          fi
          echo "Ejecutando ${#TEST_FILES[@]} archivos de test Deno"
          deno test --allow-net --allow-env --allow-read \
            --junit-path reports/deno-junit.xml \
            "${TEST_FILES[@]}"

      - name: Upload Deno reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deno-reports
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    # Requiere los secrets E2E_TEST_EMAIL y E2E_TEST_PASSWORD (usuario admin de prueba).
    # Sharding: 2 shards × 2 workers por shard = 4 tests en paralelo, aislados por e2e_scope.
    # Cada test recibe un scope único (w{worker}-{testId}-{rand}) y el teardown borra solo ese scope.
    # CRÍTICO: el `globalTeardown` de Playwright purga TODAS las filas is_e2e=true; con varios shards
    # corriendo en paralelo provocaba race conditions. Ahora solo se ejecuta en el último shard
    # (lógica en playwright.config.ts vía env SHARD_INDEX === SHARD_TOTAL).
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        total: [2]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache de los browsers de Playwright (~130MB). La key incluye la versión
      # de @playwright/test del lockfile para invalidar al actualizar.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ matrix.total }}
          # Vite necesita estas variables en build time para embeber el cliente
          # de Supabase en el bundle. Sin ellas el preview compila sin URL/key
          # y todas las E2E fallan de forma opaca.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bunx playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard${{ matrix.shard }}
          path: playwright-report-shard${{ matrix.shard }}/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces, videos & screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-shard${{ matrix.shard }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright JUnit/JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-reports-shard${{ matrix.shard }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish Playwright results to PR summary
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: reports/playwright-junit-shard${{ matrix.shard }}.xml
          check_name: Playwright results (shard ${{ matrix.shard }})
          # Gates de CI: si un test falla o no se generó el XML, el check rompe.
          fail_on_failure: true
          require_tests: true
