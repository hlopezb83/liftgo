name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "public/changelog/**"
      - "public/changelog.json"
      - "**/*.md"
      - ".lovable/**"
  push:
    branches: [main]
    paths-ignore:
      - "public/changelog/**"
      - "public/changelog.json"
      - "**/*.md"
      - ".lovable/**"
  workflow_dispatch:

permissions:
  contents: read

# Concurrencia por workflow+ref: un push nuevo cancela el run anterior del mismo branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Jobs en paralelo (todos comparten cache de bun install).
  # Antes era un único job "quality" serializado: lint → typecheck → knip → tests → build (~12 min).
  # Ahora wall time = job más lento (tests con coverage).
  # ---------------------------------------------------------------------------

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project
      - run: bun run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project
      - run: bunx tsc --noEmit -p tsconfig.app.json

  knip:
    name: Knip (archivos y dependencias sin uso)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project

      # Bloquea PRs si hay archivos huérfanos o dependencias sin uso.
      - name: Knip (blocker)
        run: bunx knip --include files,dependencies,binaries --reporter compact

      # Informativo: exports/tipos sin uso, no rompe el PR.
      - name: Knip (informativo)
        run: bunx knip --include exports,types --reporter compact
        continue-on-error: true

  tests:
    name: Tests (Vitest + Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project

      # Pre-crear reports/ defensivamente: si vitest falla antes de inicializar
      # los reporters, el step de junit-action muestra el error real.
      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Tests (Vitest) + Coverage
        # Umbrales definidos en vitest.config.ts; bajar de threshold rompe el job.
        run: bun run test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: reports/coverage/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Vitest reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-reports
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish Vitest results to PR summary
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        with:
          report_paths: reports/vitest-junit.xml
          check_name: Vitest results
          fail_on_failure: true
          require_tests: true

  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project
      - run: bun run build

  rls:
    name: RLS contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: RLS subset (roleMatrix + *.rls.test.ts)
        run: bun run test:rls

      # Verificación explícita del XML para mensaje de error claro.
      - name: Verify RLS JUnit XML exists
        if: always()
        run: |
          ls -la reports/ || true
          test -s reports/rls-junit.xml || { echo "::error::reports/rls-junit.xml no fue generado por test:rls"; exit 1; }

      - name: Upload RLS reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rls-reports
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish RLS results to PR summary
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        with:
          report_paths: reports/rls-junit.xml
          check_name: RLS results
          fail_on_failure: true
          require_tests: true

  edge-functions:
    name: Edge Functions (Deno smoke tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Deno fmt --check
        run: cd supabase/functions && deno fmt --check

      - name: Deno lint
        run: cd supabase/functions && deno lint

      - name: Run Deno tests
        # Detecta el caso "0 tests" (exit 1). SUPABASE_URL explícito para no depender
        # del fallback localhost del helper.
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          set -euo pipefail
          mkdir -p reports
          mapfile -d '' TEST_FILES < <(find supabase/functions -name 'index_test.ts' -print0)
          if [[ ${#TEST_FILES[@]} -eq 0 ]]; then
            echo "::error::No se encontraron archivos index_test.ts en supabase/functions"
            exit 1
          fi
          echo "Ejecutando ${#TEST_FILES[@]} archivos de test Deno"
          deno test --allow-net --allow-env --allow-read \
            --junit-path reports/deno-junit.xml \
            "${TEST_FILES[@]}"

      - name: Upload Deno reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deno-reports
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write
    # Sharding: 2 shards × 2 workers por shard = 4 tests en paralelo, aislados por e2e_scope.
    # CRÍTICO: el `globalTeardown` solo corre en el último shard (lógica en playwright.config.ts
    # vía env SHARD_INDEX === SHARD_TOTAL) para evitar race conditions.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        total: [2]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-project

      # Cache de browsers (~130MB). Key basada solo en la versión de Playwright del lockfile
      # para no invalidar al cambiar otras deps.
      - name: Get Playwright version
        id: pw-version
        run: |
          VERSION=$(node -p "require('./package.json').devDependencies['@playwright/test'] || require('./package.json').dependencies['@playwright/test']")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_PORTAL_EMAIL: ${{ secrets.E2E_PORTAL_EMAIL }}
          E2E_PORTAL_PASSWORD: ${{ secrets.E2E_PORTAL_PASSWORD }}
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ matrix.total }}
          # Vite necesita estas variables en build time para embeber el cliente
          # de Supabase en el bundle. Sin ellas las E2E fallan de forma opaca.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bunx playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard${{ matrix.shard }}
          path: playwright-report-shard${{ matrix.shard }}/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces, videos & screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-shard${{ matrix.shard }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright JUnit/JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-reports-shard${{ matrix.shard }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish Playwright results to PR summary
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        with:
          report_paths: reports/playwright-junit-shard${{ matrix.shard }}.xml
          check_name: Playwright results (shard ${{ matrix.shard }})
          fail_on_failure: true
          require_tests: true

  # Gate único para branch protection: requiere todos los jobs anteriores.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, knip, tests, build, rls, edge-functions, e2e]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::Uno o más jobs de CI fallaron"
            exit 1
          fi
          echo "Todos los jobs pasaron"
