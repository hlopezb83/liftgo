name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Knip, Tests, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      # Falla el PR si aparecen archivos huérfanos o dependencias sin uso.
      - name: Knip (archivos y dependencias sin uso)
        run: bunx knip --include files,dependencies,binaries --reporter compact

      # Solo informativo: exports y tipos sin uso (no rompen el PR).
      - name: Knip (exports/tipos sin uso, informativo)
        run: bunx knip --include exports,types --reporter compact || true

      - name: Tests (Vitest)
        run: bun run test

      - name: Build
        run: bun run build

  edge-functions:
    name: Edge Functions (Deno smoke tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Deno tests
        run: |
          find supabase/functions -name 'index_test.ts' -print0 \
            | xargs -0 deno test --allow-net --allow-env --allow-read

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # No bloquea el merge mientras se configuran los 2 secrets:
    # E2E_TEST_EMAIL, E2E_TEST_PASSWORD (usuario de prueba con rol admin).
    # Los tests usan login normal y respetan RLS — no se requiere service role key.
    # Quitar este flag una vez los secrets estén en el repo.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

