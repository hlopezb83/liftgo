name: Release Drafter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-drafter-${{ github.workflow }}-${{ github.ref }}
  # Solo push:main y workflow_dispatch; nunca cancelamos porque cada run actualiza el draft acumulativo.
  cancel-in-progress: false

jobs:
  update_release_draft:
    name: Actualizar draft de release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Release drafter
        # Pin a SHA (action de terceros). v7.3.1.
        uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
