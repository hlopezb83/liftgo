name: Gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  # Cancelar solo en PRs; en push:main y schedule preservamos histórico de escaneos por SHA.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    name: Detectar secretos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history para detectar leaks históricos en PRs.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Falla el job si encuentra hallazgos verificados.
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_SUMMARY: true
